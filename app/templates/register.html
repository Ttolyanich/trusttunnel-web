{% extends 'base_client.html' %}
{% from '_icons.html' import icon %}
{% block title %}Регистрация{% endblock %}
{% block body %}
<div class="auth-wrap"><div class="auth-card">
  <div class="auth-logo">
    <span class="logo green">{{ icon('shield', 26) }}</span>
    <div style="text-align:center;">
      <b style="font-size:18px;">{{ brand }}</b>
      <div class="mut" style="font-size:13px;">создание аккаунта</div>
    </div>
  </div>
  <div class="card">
    {% if error %}<div class="alert warn">{{ icon('zap') }} {{ error }}</div>{% endif %}
    <form method="post" action="/register">
      <div class="field" style="margin-bottom:12px;">
        <label>Email</label>
        <input name="email" type="email" required autofocus placeholder="you@example.com">
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Пароль</label>
        <input name="password" type="password" required minlength="6" placeholder="минимум 6 символов">
      </div>
      <div class="field" style="margin-bottom:18px;">
        <label>Сколько будет {{ captcha_a }} + {{ captcha_b }}?</label>
        <input name="captcha" type="number" required placeholder="Введите число">
      </div>
      <button type="submit" style="width:100%;">{{ icon('user-plus') }} Зарегистрироваться</button>
    </form>
    <p class="mut" style="margin:16px 0 0;text-align:center;">Уже есть аккаунт? <a href="/login">Войти</a></p>
  </div>
</div></div>
{% endblock %}
