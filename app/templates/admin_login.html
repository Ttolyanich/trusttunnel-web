{% extends 'base.html' %}
{% from '_icons.html' import icon %}
{% block title %}Админка — {{ brand }}{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo">{{ icon('shield', 26) }} {{ brand }} · admin</div>
    <div class="card">
      <h2 class="mb0">Вход администратора</h2>
      {% if error %}<div class="alert err">{{ error }}</div>{% endif %}
      <form method="post" action="/admin/login">
        <label>E-mail</label>
        <input type="email" name="email" required autofocus>
        <label>Пароль</label>
        <input type="password" name="password" required>
        <button class="btn primary mt" style="width:100%">{{ icon('lock', 16) }} Войти</button>
      </form>
    </div>
    <div style="text-align:center">
      <button class="btn ghost sm" onclick="toggleTheme()">{{ icon('moon', 15) }} Сменить тему</button>
    </div>
  </div>
</div>
{% endblock %}
